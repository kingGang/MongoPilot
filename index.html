<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MongoPilot</title>
    <style>
      /* 启动 splash —— 首次安装 / 冷启动 Vue mount 完成前避免一片空白 */
      html, body { margin: 0; height: 100%; overflow: hidden; background: #fafafa; }
      #app-splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #fafafa; color: #666;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        z-index: 9999;
      }
      .splash-spin {
        width: 36px; height: 36px;
        border: 3px solid #e0e0e0;
        border-top-color: #2080f0;
        border-radius: 50%;
        animation: splash-spin 0.6s linear infinite;
        margin-bottom: 14px;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      .splash-title {
        font-size: 18px; font-weight: 600;
        margin-bottom: 6px; color: #333;
        letter-spacing: 0.5px;
      }
      .splash-sub { font-size: 12px; color: #888; }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <div class="splash-spin"></div>
      <div class="splash-title">MongoPilot</div>
      <div class="splash-sub">正在启动...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
